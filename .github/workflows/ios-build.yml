name: Build iOS App

on:
  workflow_dispatch: # Allows you to manually click the "Run" button anytime

jobs:
  build:
    runs-on: macos-14 # Fires up an official cloud-based Apple Mac server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Compile Native iOS Application
        run: |
          xcodebuild -project "iOS-SmartWebView.xcodeproj" \
                     -scheme "iOS-SmartWebView" \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Package App Binary into IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/iOS-SmartWebView.app Payload/ || cp -r build/Release-iphoneos/*.app Payload/
          zip -r Synopus.ipa Payload

      - name: Upload Completed App File
        uses: actions/upload-artifact@v4
        with:
          name: Synopus-iPhone-App
          path: Synopus.ipa
