name: Build iOS App

on:
  workflow_dispatch: # Allows you to manually click the "Run" button anytime

jobs:
  build:
    runs-on: macos-14 # Fires up an official cloud-based Apple Mac server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Auto-Detect Project and Build
        run: |
          # Automatically detects the target project structure and compiles it cleanly
          xcodebuild -workspace *.xcworkspace 2>/dev/null || xcodebuild -project *.xcodeproj \
                     -alltargets \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Package App Binary into IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Synopus.ipa Payload

      - name: Upload Completed App File
        uses: actions/upload-artifact@v4
        with:
          name: Synopus-iPhone-App
          path: Synopus.ipa
